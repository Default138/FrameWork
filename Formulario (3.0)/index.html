<html>
<head>
    <meta charset="UTF-8">
    <title>Tabela</title>
</head>
<body>
<form>
    <h1>Crie seu formulário</h1>
    <button type="button" onclick="novoCampo()">Novo campo</button>
    <button type="button" onclick="visualizarForm()">Concluir</button><hr>
   <label for="rotulo0">Rótulo</label>
    <input type="text" name="rotulo0">
    <label for="tipo0">Tipo</label>
    <select name="tipo0" onchange="toggleOpcoes(this, 0)">
        <option value="text">Texto</option>
        <option value="number">Número</option>
        <option value="date">Data</option>
        <option value="select">Opções (Select)</option>
        <option value="textarea">Área de texto</option>
    </select>
    <span id="opcoes-wrapper0" style="display:none">
        &nbsp;<label>Opções (separadas por vírgula):</label>
        <input type="text" name="opcoes0" placeholder="ex: Sim,Não,Talvez">
    </span>
<br>
</form>
<script src="script.js"></script>
<iframe id="preview" style="width:100%; height:300px;"></iframe>
</body>
</html>
